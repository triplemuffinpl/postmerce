services:
  postgres:
    image: postgres:16-alpine
    container_name: postmerce-postgres-dev
    environment:
      POSTGRES_DB: postmerce
      POSTGRES_USER: postmerce
      POSTGRES_PASSWORD: postmerce
    ports:
      - "55432:5432"
    volumes:
      - postmerce_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postmerce -d postmerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postmerce_pg_data:
